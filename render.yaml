services:
  - type: web
    name: digital-meetup
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application
    releaseCommand: python manage.py migrate --noinput
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: MEDIA_ROOT
        value: /var/data/media
      - key: DATABASE_URL
        fromDatabase:
          name: digital-meetup-db
          property: connectionString
    disk:
      name: media
      mountPath: /var/data/media
      sizeGB: 1

databases:
  - name: digital-meetup-db
    plan: free
    databaseName: digital_meetup
    user: digital_meetup
